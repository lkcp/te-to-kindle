name: TE to Kindle

on:
  schedule:
    # Sunday 09:10 Beijing (UTC+8) = Sunday 01:10 UTC
    - cron: "10 1 * * 0"
  workflow_dispatch:
    inputs:
      format:
        description: "File format to push"
        type: choice
        default: epub
        options: [mobi, epub, azw3, pdf]

permissions:
  contents: write   # needed to commit last_sent.txt back

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Push to Kindle
        env:
          KINDLE_EMAIL: ${{ secrets.KINDLE_EMAIL }}
          SMTP_USER:    ${{ secrets.SMTP_USER }}
          SMTP_PASS:    ${{ secrets.SMTP_PASS }}
          SMTP_HOST:    ${{ secrets.SMTP_HOST }}
          SMTP_PORT:    ${{ secrets.SMTP_PORT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TE_FORMAT:    ${{ inputs.format || 'mobi' }}
        run: python te_to_kindle.py

      - name: Persist last_sent.txt
        if: success()
        run: |
          if [[ -n "$(git status --porcelain last_sent.txt)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add last_sent.txt
            git commit -m "chore: mark week as sent"
            git push
          fi
